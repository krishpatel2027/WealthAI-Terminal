services:
  - type: web
    name: wealthai-fullstack
    env: docker
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: FRONTEND_URL
        value: https://wealthai-fullstack.onrender.com # Self-reference
    region: oregon
    plan: free
